<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerenciador de Alunos</title>

<link rel="stylesheet" href="style.css">
</head>


<body>

<header class="header">

<h1>Sistema de Cadastro de Alunos</h1>
<p>Exemplo prático utilizando Arrays em JavaScript</p>

</header>



<main class="container">

<section class="form-area">

<h2>Adicionar Aluno</h2>

<div class="input-group">

<label for="nomeAluno">Nome do aluno</label>

<input
type="text"
id="nomeAluno"
placeholder="Digite o nome do aluno"
/>

</div>

<div class="buttons">

<button onclick="adicionarAluno()">
Adicionar Aluno
</button>

<button onclick="listarAlunos()">
Mostrar Lista
</button>

</div>

</section>



<section class="list-area">

<h2>Lista de Alunos</h2>

<ul id="lista"></ul>

</section>

</main>



<footer class="footer">

<p>Projeto educacional - Estruturas de Arrays com JavaScript</p>

</footer>


<script src="script.js"></script>

</body>
<script src="./script.js"></script>
</html>
